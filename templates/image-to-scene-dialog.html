<div class="mass-import-dialog standard-form">
    
    <h3 class="form-header"><i class="fas fa-folder-open"></i> Source</h3>
    <div class="form-group">
        <label>Folder Path</label>
        <div class="form-fields picker-group">
            <input type="text" name="folder-path" placeholder="modules/my-module/maps">
            <button type="button" class="picker-button icon" title="Browse">
                <i class="fas fa-file-import"></i>
            </button>
        </div>
    </div>

    <h3 class="form-header"><i class="fas fa-cogs"></i> Configuration</h3>
    <div class="form-group">
        <label>Target Folder Name</label>
        <div class="form-fields">
            <input type="text" id="folderName" value="Imported Scenes">
        </div>
    </div>

    <!-- Compact Row: Background & Navigation -->
    <div class="form-group">
        <label>Display Options</label>
        <div class="form-fields">
            <label class="checkbox" title="Background Color">
                Bg Color <input type="color" id="background_color" value="#000000" style="height: 24px; width: 40px; padding: 0; border: none;">
            </label>
            <label class="checkbox" title="Create Scene Navigation">
                Navigation <input type="checkbox" name="select_navigation">
            </label>
        </div>
    </div>

    <h3 class="form-header"><i class="fas fa-ruler-combined"></i> Grid Settings</h3>
    
    <!-- Compact Row: Type & Size -->
    <div class="form-group">
        <label>Type & Size</label>
        <div class="form-fields">
            <select name="select_grid_type" style="flex: 2">
                <option value="0">Gridless</option>
                <option value="1" selected>Square</option>
                <option value="2">Hex Row-Odd</option>
                <option value="3">Hex Row-Even</option>
                <option value="4">Hex Col-Odd</option>        
                <option value="5">Hex Col-Even</option>     
            </select>
            <input type="number" id="grid_size" value="100" min="50" placeholder="Px" style="flex: 1" title="Grid Size (px)">
        </div>
    </div>

    <!-- Compact Row: Dist, Units, Alpha -->
    <div class="form-group">
        <label>Dimensions</label>
        <div class="form-fields">
            <input type="number" id="grid_distance" value="1.5" step="0.5" style="flex: 1" title="Grid Distance">
            <input type="text" id="grid_units" value="m" style="flex: 1" title="Grid Units">
            <div style="flex: 2; display: flex; align-items: center; gap: 5px;" title="Grid Opacity">
                <label style="font-weight: normal; font-size: 0.9em;">Alpha</label>
                <input type="range" id="grid_alpha" min="0" max="1" step="0.05" value="0.2">
            </div>
        </div>
    </div>

    <h3 class="form-header"><i class="fas fa-lightbulb"></i> Lighting & Vision</h3>
    
    <!-- Compact Row: Vision & Fog -->
    <div class="form-group">
        <label>Settings</label>
        <div class="form-fields">
            <label class="checkbox">
                Token Vision <input type="checkbox" name="token_vision" checked>
            </label>
            <label class="checkbox">
                Fog Exploration <input type="checkbox" name="fog_exploration" checked>
            </label>
        </div>
    </div>
</div>
